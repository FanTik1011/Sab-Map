<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subnautica 2 Interactive Map</title>
    <link rel="preconnect" href="https://subnautica2.gg" crossorigin>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="map-page">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <div class="sidebar-title">
            <span>Submatica Map</span>
          </div>
          <button class="icon-button" id="collapseSidebar" type="button" aria-label="Згорнути панель">‹</button>
        </div>

        <div class="tabs" role="tablist" aria-label="Map tools">
          <button class="tab is-active" id="markersTab" type="button">Markers</button>
          <button class="tab" id="positionTab" type="button">Position</button>
        </div>

        <section class="panel is-active" id="markersPanel">
          <label class="search">
            <span class="sr-only">Пошук</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="Search markers">
          </label>
          <div class="bulk-actions">
            <button id="showAll" type="button">Show all</button>
            <button id="hideAll" type="button">Hide all</button>
          </div>
          <nav class="buckets" id="bucketList" aria-label="Marker categories"></nav>
        </section>

        <section class="panel position-panel" id="positionPanel">
          <form class="position-form" id="positionForm">
            <label class="position-title" for="coordX">
              <span class="pin-glyph"></span>
              Current position
            </label>
            <p>Open ESC in-game to find your coordinates. They are shown in X, Y, Z order; enter only X and Y here.</p>
            <div class="coord-grid">
              <input id="coordX" inputmode="decimal" autocomplete="off" placeholder="X -325129">
              <input id="coordY" inputmode="decimal" autocomplete="off" placeholder="Y 439378">
              <button type="submit">Set</button>
            </div>
            <div class="position-readout" id="positionReadout"></div>
          </form>
        </section>
      </aside>

      <section class="map-stage">
        <button class="reopen" id="openSidebar" type="button" aria-label="Відкрити панель">›</button>
        <canvas id="mapCanvas"></canvas>
        <canvas id="markerCanvas"></canvas>
        <div class="map-loading" id="mapLoading">
          <div class="map-loading-spinner"></div>
          <span>Завантаження карти…</span>
        </div>
        <div class="hud top-left">
          <strong id="visibleCount">0</strong>
          <span>visible markers</span>
        </div>
        <div class="map-controls" aria-label="Map controls">
          <button id="zoomIn" type="button" aria-label="Збільшити">+</button>
          <button id="zoomOut" type="button" aria-label="Зменшити">−</button>
          <button id="resetView" type="button" aria-label="Скинути вигляд">⌂</button>
        </div>
        <article class="popup" id="popup" hidden></article>
      </section>
    </main>

    <script src="sn2-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
